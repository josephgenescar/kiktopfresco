# ============================================================
#  KikTop Fresco — Netlify Configuration
# ============================================================



  [build]
  command = "node scripts/generate-data.js"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# ── HEADERS ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── REDIRECTS ───────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/menu"
  to     = "/#menu"
  status = 301

# ── NETLIFY CMS SUPPORT ─────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"
    X-Frame-Options = "SAMEORIGIN"

# Content security policy for CMS
[[headers]]
  for = "/admin/index.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self'"
    X-Frame-Options = "SAMEORIGIN"

[[redirects]]
  from   = "/points"
  to     = "/#points"
  status = 301

# ── ENVIRONMENT VARIABLES (mete nan Netlify dashboard) ──────
# SUPABASE_URL    = https://XXXX.supabase.co
# SUPABASE_ANON   = eyJ...

