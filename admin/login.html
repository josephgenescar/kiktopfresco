<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>KikTop Fresco - Admin Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0D2B5E 0%, #1a3a7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 24px;
      color: #0D2B5E;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #636E72;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2D3436;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #0D2B5E;
      box-shadow: 0 0 0 3px rgba(13, 43, 94, 0.1);
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 25px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login {
      background: linear-gradient(135deg, #0D2B5E 0%, #1a3a7a 100%);
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(13, 43, 94, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-google {
      background: white;
      color: #2D3436;
      border: 2px solid #E0E0E0;
    }

    .btn-google:hover {
      background: #F8F9FA;
      border-color: #0D2B5E;
      box-shadow: 0 4px 12px rgba(13, 43, 94, 0.15);
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #BDC3C7;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #E0E0E0;
    }

    .divider span {
      padding: 0 12px;
      font-size: 12px;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #636E72;
    }

    .signup-link a {
      color: #0D2B5E;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #FFE5E5;
      color: #D63031;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo">🍔</div>
      <h1>KikTop Fresco</h1>
      <p class="subtitle">Admin CMS Login</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Email/Password Form -->
    <form id="emailForm">
      <div class="form-group">
        <label for="email">📧 Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="admin@example.com" 
          required
        />
      </div>

      <div class="form-group">
        <label for="password">🔑 Modpas</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required
        />
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        <span>Se konekte</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>oswa</span>
    </div>

    <!-- Google Login Button -->
    <button class="btn btn-google" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="1"></circle>
        <path d="M19.429 15.429a8 8 0 1 1 0-11.858"></path>
      </svg>
      <span>Kontinye ak Google</span>
    </button>

    <!-- Sign Up Link -->
    <p class="signup-link">
      Ou pa gen kont? <a href="#" id="signupLink">Kreye kont</a>
    </p>
  </div>

  <!-- Netlify Identity Widget -->
  <script src="https://cdn.jsdelivr.net/npm/netlify-identity-widget@1"></script>

  <script>
    // Initialize Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init();
    }

    const emailForm = document.getElementById('emailForm');
    const googleBtn = document.getElementById('googleBtn');
    const signupLink = document.getElementById('signupLink');
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    // Email/Password Login
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      loginBtn.classList.add('loading');
      loginBtn.innerHTML = '<div class="spinner"></div><span>Patizan...</span>';

      try {
        if (window.netlifyIdentity) {
          const user = await window.netlifyIdentity.login(email, password, true);
          console.log('✅ Login successful:', user);
          window.location.href = '/admin/';
        }
      } catch (error) {
        console.error('❌ Login error:', error);
        showError('Email oswa modpas pa kòrèk');
        loginBtn.classList.remove('loading');
        loginBtn.innerHTML = 'Se konekte';
      }
    });

    // Google Login
    googleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      
      if (window.netlifyIdentity) {
        googleBtn.classList.add('loading');
        googleBtn.innerHTML = '<div class="spinner"></div><span>Patizan...</span>';
        
        try {
          // Trigger Google authentication
          window.netlifyIdentity.authenticate({
            provider: 'google'
          }, (err, user) => {
            if (err) {
              console.error('❌ Google auth error:', err);
              showError('Pwoblem avèk Google login');
              googleBtn.classList.remove('loading');
              googleBtn.innerHTML = 'Kontinye ak Google';
            } else if (user) {
              console.log('✅ Google login successful:', user);
              window.location.href = '/admin/';
            }
          });
        } catch (error) {
          console.error('❌ Error:', error);
          showError('Pwoblem avèk koneksyon');
          googleBtn.classList.remove('loading');
          googleBtn.innerHTML = 'Kontinye ak Google';
        }
      }
    });

    // Sign Up Link
    signupLink.addEventListener('click', (e) => {
      e.preventDefault();
      
      if (window.netlifyIdentity) {
        // Open sign-up modal
        window.netlifyIdentity.open('signup');
      } else {
        window.location.href = '/#signup';
      }
    });

    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }

    // Check if already logged in
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (user) {
          console.log('✅ Already logged in, redirecting...');
          window.location.href = '/admin/';
        }
      });
    }
  </script>
</body>
</html>
