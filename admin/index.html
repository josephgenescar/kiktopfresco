<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>KikTop Fresco - Admin CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/netlify-cms-app@^2.9.1/dist/cms.css" />
  <link rel="stylesheet" href="https://unpkg.com/netlify-identity-widget@1.5.1/build/netlify-identity-widget.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>" />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #nc-root { height: 100vh; }
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0D2B5E 0%, #1a3a7a 100%);
      color: white;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  
  <!-- Netlify Identity Widget -->
  <script src="https://unpkg.com/netlify-identity-widget@1.5.1/build/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.10.192"></script>

  <script>
    // Initialize Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init();
    }

    // CMS Configuration
    const cmsConfig = {
      backend: {
        name: 'git-gateway',
        branch: 'main',
        auth_endpoint: '/auth'
      },
      local_backend: true,
      media_folder: 'images/uploads',
      public_folder: '/images/uploads',
      collections: [
        {
          name: 'announcements',
          label: '📢 Annonces',
          folder: 'content/announcements',
          create: true,
          slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
          fields: [
            { label: 'Titre de l\'Annonce', name: 'title', widget: 'string' },
            { label: 'Description', name: 'body', widget: 'markdown' },
            { label: 'Type', name: 'type', widget: 'select', options: ['texte', 'image'] },
            { label: 'Image (si type=image)', name: 'image', widget: 'image', required: false },
            { label: 'Couleur de fond', name: 'bgColor', widget: 'color', required: false, default: '#D63031' },
            { label: 'Texte couleur', name: 'textColor', widget: 'color', required: false, default: '#ffffff' },
            { label: 'Actif', name: 'active', widget: 'boolean', default: true },
            { label: 'Date de début', name: 'startDate', widget: 'datetime', required: false },
            { label: 'Date de fin', name: 'endDate', widget: 'datetime', required: false },
            { label: 'Position', name: 'position', widget: 'number', default: 0 }
          ]
        },
        {
          name: 'categories',
          label: '🏷️ Catégories',
          folder: 'content/categories',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: 'Nom', name: 'name', widget: 'string' },
            { label: 'Description', name: 'description', widget: 'text' },
            { label: 'Emoji/Icon', name: 'icon', widget: 'string', default: '🍴' },
            { label: 'Position', name: 'position', widget: 'number', default: 0 },
            { label: 'Afficher', name: 'visible', widget: 'boolean', default: true }
          ]
        },
        {
          name: 'settings',
          label: '⚙️ Paramètres',
          folder: 'content/settings',
          create: false,
          slug: '{{slug}}',
          files: [
            {
              name: 'general',
              label: 'Général',
              file: 'content/settings/general.yml',
              fields: [
                { label: 'Nom du Site', name: 'siteName', widget: 'string', default: 'KikTop Fresco' },
                { label: 'Description', name: 'siteDescription', widget: 'text' },
                { label: 'WhatsApp Number', name: 'whatsappNumber', widget: 'string', pattern: ['^[0-9]{10,15}$', 'Format: ex 50936123456'] },
                { label: 'Email', name: 'email', widget: 'string' },
                { label: 'Adresse', name: 'address', widget: 'string' },
                { label: 'Logo URL', name: 'logo', widget: 'image' },
                { label: 'Couleur Principal', name: 'primaryColor', widget: 'color', default: '#0D2B5E' },
                { label: 'Couleur Accent', name: 'accentColor', widget: 'color', default: '#F5C518' }
              ]
            }
          ]
        }
      ]
    };

    // Wait for CMS and Identity to load
    document.addEventListener('DOMContentLoaded', () => {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', user => {
          console.log('✅ Netlify Identity initialized');
          
          if (!user) {
            console.log('ℹ️ No user logged in - showing login');
            window.netlifyIdentity.open();
          } else {
            console.log('✅ User authenticated, initializing CMS...');
            initCMS();
          }
        });

        window.netlifyIdentity.on('login', user => {
          console.log('✅ User logged in');
          initCMS();
        });

        window.netlifyIdentity.on('logout', () => {
          console.log('👋 User logged out');
          window.location.reload();
        });
      } else {
        console.error('❌ Netlify Identity not loaded');
      }
    });

    function initCMS() {
      if (window.CMS) {
        console.log('📝 Initializing Netlify CMS...');
        window.CMS.init({ config: cmsConfig });
        console.log('✅ Netlify CMS initialized successfully');
      } else {
        console.error('❌ CMS script not loaded');
      }
    }
  </script>
</body>
</html>
    }
  </script>

  <style>
    /* KikTop Fresco CMS Branding */
    :root {
      --cms-primary: #0D2B5E;
      --cms-accent: #F5C518;
      --cms-success: #00B894;
      --cms-danger: #D63031;
      --cms-gray: #636E72;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0F5FF;
      color: #1a1a2e;
      height: 100%;
      width: 100%;
    }

    #nc-root {
      height: 100vh;
      width: 100%;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #1a1a2e;
        color: #f0f0f0;
      }
    }

    /* CMS Header Branding */
    [class*="Header"] {
      background: linear-gradient(135deg, var(--cms-primary), #1A4494) !important;
    }

    [class*="AppHeader"] {
      background: linear-gradient(135deg, var(--cms-primary), #1A4494) !important;
      color: white !important;
    }

    [class*="TopBar"] {
      background: linear-gradient(135deg, var(--cms-primary), #1A4494) !important;
    }

    /* Buttons */
    [class*="Button"][type="primary"],
    [class*="PrimaryButton"],
    button.nc-button--primary {
      background: var(--cms-accent) !important;
      color: var(--cms-primary) !important;
      font-weight: 700 !important;
    }

    button.nc-button--primary:hover {
      opacity: 0.9 !important;
    }

    /* Success/Delete buttons */
    [class*="SuccessButton"],
    button.nc-button--success {
      background: var(--cms-success) !important;
    }

    [class*="DeleteButton"],
    button.nc-button--delete {
      background: var(--cms-danger) !important;
    }

    /* Loading and general */
    body.loading {
      opacity: 0.5;
    }

    /* Ensure CMS renders */
    #nc-root, [data-react-root], .nc-app {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      height: 100% !important;
    }
  </style>
</body>
</html>
