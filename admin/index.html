<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>KikTop Fresco - Admin CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/netlify-cms-app@^2.9.1/dist/cms.css" />
  <link rel="stylesheet" href="https://unpkg.com/netlify-identity-widget@1.5.1/build/netlify-identity-widget.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>" />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #nc-root { height: 100vh; }
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0D2B5E 0%, #1a3a7a 100%);
      color: white;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  
  <!-- Netlify Identity Widget -->
  <script src="https://unpkg.com/netlify-identity-widget@1.5.1/build/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.10.192"></script>

  <script>
    // Initialize Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init();
    }

    // ═══════════════════════════════════════
    // CMS CONFIGURATION (COMPLET & KORIJE)
    // ═══════════════════════════════════════
    const cmsConfig = {
      backend: {
        name: 'git-gateway',
        branch: 'main',
        auth_endpoint: '/auth'
      },
      local_backend: ['localhost', '127.0.0.1', ''].includes(window.location.hostname),

      // ✅ WORKFLOW ENABLED - Draft → In Review → Ready
      publish_mode: 'editorial_workflow',
      
      editorial_workflow: {
        status_path: '_workflow_state',
        collections: ['products', 'announcements', 'specials']
      },

      media_folder: 'images/uploads',
      public_folder: '/images/uploads',

      collections: [

        // ═══════════════════════════════════════
        // ANNOUNCEMENTS (Annonces)
        // ═══════════════════════════════════════
        {
          name: 'announcements',
          label: '📢 Annonces',
          folder: 'content/announcements',
          create: true,
          slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
          editor: { preview: false },
          fields: [
            { label: 'Titre de l\'Annonce', name: 'title', widget: 'string' },
            { label: 'Description', name: 'body', widget: 'markdown' },
            { label: 'Type', name: 'type', widget: 'select', options: ['texte', 'image'] },
            { label: 'Image (si type=image)', name: 'image', widget: 'image', required: false },
            { label: 'Couleur de fond', name: 'bgColor', widget: 'color', required: false, default: '#D63031' },
            { label: 'Texte couleur', name: 'textColor', widget: 'color', required: false, default: '#ffffff' },
            { label: 'Actif', name: 'active', widget: 'boolean', default: true },
            { label: 'Date de début', name: 'startDate', widget: 'datetime', required: false },
            { label: 'Date de fin', name: 'endDate', widget: 'datetime', required: false },
            { label: 'Position', name: 'position', widget: 'number', default: 0 }
          ]
        },

        // ═══════════════════════════════════════
        // CATEGORIES (Catégories)
        // ═══════════════════════════════════════
        {
          name: 'categories',
          label: '🏷️ Catégories',
          folder: 'content/categories',
          create: true,
          slug: '{{slug}}',
          editor: { preview: false },
          fields: [
            { label: 'Nom', name: 'name', widget: 'string' },
            { label: 'Description', name: 'description', widget: 'text' },
            { label: 'Emoji/Icon', name: 'icon', widget: 'string', default: '🍴' },
            { label: 'Position', name: 'position', widget: 'number', default: 0 },
            { label: 'Afficher', name: 'visible', widget: 'boolean', default: true }
          ]
        },

        // ═══════════════════════════════════════
        // ✅ FIX #3: PRODUCTS — te manke nèt!
        // ═══════════════════════════════════════
        {
          name: 'products',
          label: '🍔 Produits',
          folder: 'content/products',
          create: true,
          slug: '{{slug}}',
          editor: { preview: false },
          fields: [
            { label: 'Nom du Produit', name: 'name', widget: 'string' },
            { label: 'Description', name: 'description', widget: 'text' },
            {
              label: 'Catégorie', name: 'category', widget: 'relation',
              collection: 'categories',
              search_fields: ['name'],
              value_field: 'name',
              display_fields: ['name']
            },
            { label: 'Prix (en Gourdes)', name: 'price', widget: 'number', value_type: 'int' },
            { label: 'Prix Promo (optionnel)', name: 'salePrice', widget: 'number', value_type: 'int', required: false },
            { label: 'Image', name: 'image', widget: 'image' },
            { label: 'En Stock', name: 'inStock', widget: 'boolean', default: true },
            { label: 'Valeur Points', name: 'pointValue', widget: 'number', value_type: 'int', default: 1 },
            { label: 'Disponible', name: 'available', widget: 'boolean', default: true },
            { label: 'Position', name: 'position', widget: 'number', default: 0 }
          ]
        },

        // ═══════════════════════════════════════
        // ✅ FIX #3: SPECIALS — te manke nèt!
        // ═══════════════════════════════════════
        {
          name: 'specials',
          label: '✨ Spécial Dimanche',
          folder: 'content/specials',
          create: true,
          slug: '{{slug}}',
          editor: { preview: false },
          fields: [
            { label: 'Nom du Produit', name: 'name', widget: 'string' },
            { label: 'Description', name: 'description', widget: 'markdown' },
            { label: 'Image', name: 'image', widget: 'image' },
            { label: 'Prix Original', name: 'originalPrice', widget: 'number', value_type: 'int' },
            { label: 'Prix Spécial', name: 'salePrice', widget: 'number', value_type: 'int' },
            { label: 'Jour (0=Dimanche, 1=Lundi...)', name: 'day', widget: 'number', default: 0 },
            {
              label: 'Heure de fin (HH:MM)', name: 'endTime', widget: 'string',
              pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', 'Format: HH:MM']
            },
            { label: 'Actif', name: 'active', widget: 'boolean', default: true }
          ]
        },

        // ═══════════════════════════════════════
        // SETTINGS (Paramètres Généraux)
        // ═══════════════════════════════════════
        {
          name: 'settings',
          label: '⚙️ Paramètres',
          create: false,
          files: [
            {
              name: 'general',
              label: 'Général',
              file: 'content/settings/general.yml',
              fields: [
                { label: 'Nom du Site', name: 'siteName', widget: 'string', default: 'KikTop Fresco' },
                { label: 'Description', name: 'siteDescription', widget: 'text' },
                { label: 'WhatsApp Number', name: 'whatsappNumber', widget: 'string', pattern: ['^[0-9]{8,15}$', 'Format: 31786463 oswa 50936123456'] },
                { label: 'Email', name: 'email', widget: 'string' },
                { label: 'Adresse', name: 'address', widget: 'string' },
                { label: 'Logo URL', name: 'logo', widget: 'image' },
                { label: 'Couleur Principal', name: 'primaryColor', widget: 'color', default: '#0D2B5E' },
                { label: 'Couleur Accent', name: 'accentColor', widget: 'color', default: '#F5C518' }
              ]
            }
          ]
        }

      ] // fin collections
    }; // fin cmsConfig

    // ═══════════════════════════════════════
    // NETLIFY IDENTITY + CMS INIT
    // ═══════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', user => {
          console.log('✅ Netlify Identity initialized');
          if (!user && !cmsConfig.local_backend) {
            console.log('ℹ️ No user logged in - showing login');
            window.netlifyIdentity.open();
          } else {
            if (user) console.log('✅ User authenticated, initializing CMS...');
            if (!user && cmsConfig.local_backend) console.log('ℹ️ Local backend enabled, initializing CMS without login');
            initCMS();
          }
        });

        window.netlifyIdentity.on('login', () => {
          console.log('✅ User logged in');
          initCMS();
        });

        window.netlifyIdentity.on('logout', () => {
          console.log('👋 User logged out');
          window.location.reload();
        });
      } else {
        if (cmsConfig.local_backend) {
          console.log('ℹ️ Netlify Identity not loaded, but local backend enabled');
          initCMS();
        } else {
          console.error('❌ Netlify Identity not loaded');
        }
      }
    });

    function initCMS() {
      if (window.CMS) {
        console.log('📝 Initializing Netlify CMS...');
        window.CMS.init({ config: cmsConfig });
        console.log('✅ Netlify CMS initialized successfully');
      } else {
        console.error('❌ CMS script not loaded');
      }
    }
  </script>
</body>
</html>
